# Home
Home:
  GDP_GROWTH:
    name: "GDP Growth"
    metric: "GDP_QOQ"
    comparison_type: "not applicable"
    comparison_label: "vs previous quarter"
    main_unit: "%"
    delta_unit: "pp"
    description: "Change in UK economic output compared with the previous quarter."
  INFLATION:
    name: "Inflation Rate"
    metric: "CPI"
    comparison_type: "target"
    target: 2.0
    comparison_label: "vs 2% target"
    main_unit: "%"
    delta_unit: "pp"
    description: "Annual change in consumer prices across the UK."
  UNEMPLOYMENT:
    name: "Unemployment Rate"
    metric: "UNRATE"
    comparison_type: "previous_observation"
    comparison_label: "vs previous month"
    main_unit: "%"
    delta_unit: "pp"
    delta_direction: "inverse"
    description: "Share of the labour force currently unemployed."
  BANK_RATE:
    name: "Bank of England Policy Rate"
    metric: "BANK_RATE_DA"
    comparison_type: "previous_distinct_value"
    comparison_label: "at last rate change"
    main_unit: "%"
    delta_unit: "pp"
    description: "The Bank of England’s current policy interest rate."
  HOUSE_PRICE_GROWTH:
    name: "House Price Growth Rate"
    metric: "UK_HPI_YOY_CHANGE_UK"
    comparison_type: "not applicable"
    comparison_label: "vs previous month"
    main_unit: "%"
    delta_unit: "pp"
    description: "Annual change in average UK house prices."
  FTSE_250:
    name: "FTSE 250"
    metric: "FTSE_250_close"
    comparison_type: "return_21d"
    comparison_label: "over 1 month"
    main_unit: "index"
    delta_unit: "%"
    description: "Performance index of medium-sized UK-listed companies."


# Section 1
MacroPulse:
  # Economic Growth Momentum. GDP_QOQ is quarterly; GDP_YOY is yearly in the source.
  EGM:
    name: 'Economic Growth Momentum'
    description: 'Compare quarterly GDP momentum with the latest annual growth trend.'
    metrics: ['GDP_QOQ', 'GDP_YOY']
    aggregation: 'Quarterly'
    frequency: 'Native: quarterly and yearly'
    chart_type: 'bar_line'
    units: {'GDP_QOQ': '%', 'GDP_YOY': '%'}
    display_order: 1
  # Inflation pressures. HOUSE_PRICE_GROWTH is the manifest's housing-cost inflation series.
  IB:
    name: 'Inflation Pressures'
    description: 'Compare headline, derived core and available housing-cost inflation measures.'
    metrics: ['CPI', 'CORE_CPI']
    optional_metrics: ['HOUSE_PRICE_GROWTH']
    aggregation: 'Monthly'
    frequency: 'Monthly'
    chart_type: 'line'
    target: 2.0
    units: {'CPI': '%', 'CORE_CPI': '%', 'HOUSE_PRICE_GROWTH': '%'}
    metric_labels: {'CORE_CPI': 'Core CPI inflation (YoY)', 'HOUSE_PRICE_GROWTH': 'Housing cost inflation'}
    transformations: {'CORE_CPI': 'year_on_year_change_from_index'}
    display_order: 2
  # Labour Market Health
  LBH:
    name: 'Labour Market Health'
    description: 'Compare unemployment, employment and wage-growth indicators.'
    metrics: ['UNRATE', 'EMPRATE', 'WAGE_GROWTH']
    aggregation: 'Monthly'
    frequency: 'Monthly'
    chart_type: 'line'
    units: {'UNRATE': '%', 'EMPRATE': '%', 'WAGE_GROWTH': '%'}
    display_order: 3

